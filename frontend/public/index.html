<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover fills notch/status bar on all phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#0A0F1E" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#00E5A0" media="(prefers-color-scheme: light)" />

    <!-- Make it installable on iOS (Safari "Add to Home Screen") -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ParkSmart" />

    <!-- Android / Chrome install prompt -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ParkSmart" />

    <!-- SEO / sharing -->
    <meta name="description" content="ParkSmart Nairobi – Find and book parking in real time. Pay with M-Pesa." />
    <meta property="og:title" content="ParkSmart Nairobi" />
    <meta property="og:description" content="Find parking in seconds. Pay with M-Pesa." />
    <meta property="og:type" content="website" />

    <!-- Manifest links -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Prevent bounce/scroll on iOS body -->
    <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        height: 100dvh;
        background: #0A0F1E;
      }
      #root { height: 100%; height: 100dvh; }
    </style>

    <title>ParkSmart Nairobi</title>
  </head>
  <body>
    <noscript>You need JavaScript enabled to run ParkSmart.</noscript>
    <div id="root"></div>

    <!-- Register service worker for offline support + installability -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // Capture the install prompt for Android "Add to Home Screen"
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window._installPrompt = e;
      });
    </script>
  </body>
</html>
