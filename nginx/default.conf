# nginx/default.conf
# ParkSmart Nairobi – Production Nginx config
# High-traffic: gzip, caching, rate limiting, WebSocket proxy

upstream backend {
    least_conn;
    server backend:4000;
    # Add more instances for horizontal scaling:
    # server backend2:4000;
    # server backend3:4000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws:10m  rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Connection limits per IP
    limit_conn conn 50;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Frontend (React static files) ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API endpoints ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Socket.IO (WebSocket) ──────────────────────────────────────────────────
    location /socket.io/ {
        limit_req zone=ws burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;  # Keep WebSocket alive
    }

    # ── Health check ───────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        access_log off;
    }
}
